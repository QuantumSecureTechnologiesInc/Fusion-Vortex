[package]
name = "fusion-forge"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Team"]
description = "Polyglot build system and package manager for Fusion"
license = "MIT"

# Make this a standalone workspace
[workspace]

[[bin]]
name = "forge"
path = "src/main.rs"

[dependencies]
# CLI Framework
clap = { version = "4.5", features = ["derive"] }
reactor-cli = { path = "../../cmd/reactor-cli", version = "0.1.0" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
serde_json = "1.0"

# Async Runtime
tokio = { version = "1.42", features = ["full"] }

# Error Handling
anyhow = "1.0"

# Hashing
sha2 = "0.10"

# Version Resolution
semver = "1.0"

# FFI Generation
bindgen = "0.70"

# Utilities
colored = "2.1"
which = "6.0"

[dev-dependencies]
tempfile = "3.14"
