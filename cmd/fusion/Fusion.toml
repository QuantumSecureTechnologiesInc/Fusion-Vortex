[package]
name = "fusion"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description = "Tool: Fusion CLI with excellent error messages, VS Code integration, and MCP support"
keywords = ["fusion", "cli", "vscode", "mcp", "development"]
categories = ["development-tools", "command-line-utilities"]
readme = "README.md"

[[bin]]
name = "fusion"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
clap = { version = "4.5", features = ["derive", "env"] }
clap_complete = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
reactor-cli = { path = "../reactor-cli", version = "0.1.0" }
tokio = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
git2 = { workspace = true }
dirs = { workspace = true }
urlencoding = "2.1"

# Internal crates
fusion-core = { workspace = true }
fusion-toolchain = { path = "../../crates/toolchain", package = "toolchain" }
fusion-tester = { path = "../../registry/crates/tester", package = "tester" }
fusion-formatter = { path = "../../registry/crates/formatter", package = "formatter" }
fusion-docgen = { path = "../../registry/crates/docgen", package = "docgen" }
fusion-pkgmgr = { path = "../../crates/pkgmgr", package = "pkgmgr" }
fusion-debugger = { path = "../../registry/crates/debugger", package = "debugger" }
fusion-analyzer = { path = "../../crates/analyzer", package = "analyzer" }
fusion-profiler = { path = "../../registry/crates/profiler", package = "profiler" }
fusion-audit = { path = "../../registry/crates/audit", package = "audit" }
fusion-deploy = { path = "../../registry/crates/deploy", package = "deploy" }
fusion-ai-cli = { path = "../../registry/crates/ai-cli", package = "ai-cli" }
fusion-settings = { path = "../../crates/fusion-settings" }
fusion-projects = { path = "../../crates/projects", package = "projects" }
fusion-github = { path = "../../registry/crates/github", package = "github" }
fusion-agents = { path = "../../registry/crates/agents", package = "agents" }
fusion-mcp = { path = "../../registry/crates/mcp", package = "mcp" }
fusion-ai-enhanced = { path = "../../crates/ai-enhanced", package = "ai-enhanced" }
fusion-agentic-core = { path = "../../registry/crates/fusion-agentic-core" }
fusion-vscode-runtime = { path = "../../crates/vscode-runtime", package = "vscode-runtime" }
fusion-policy = { workspace = true }
# fusion-terminal-browser = { path = "../../registry/crates/fusion-terminal-browser" }
lazy_static = "1.4"
fusion_std = { path = "../../registry/crates/std", package = "fusion_std" }
colored = "2.0"
