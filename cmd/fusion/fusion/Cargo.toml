[package]
name = "fusion"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description = "Fusion Programming Language CLI - Main entry point"

[[bin]]
name = "fusion"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
clap = { workspace = true }
clap_complete = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Internal crates
fusion-core = { path = "../../../registry/crates/core/" }
fusion-toolchain = { path = "../../crates/toolchain" }
fusion-tester = { path = "../../../registry/crates/tester/" }
fusion-formatter = { path = "../../../registry/crates/formatter/" }
fusion-docgen = { path = "../../../registry/crates/docgen/" }
fusion-pkgmgr = { path = "../../crates/pkgmgr" }
fusion-debugger = { path = "../../../registry/crates/debugger/" }
fusion-analyzer = { path = "../../crates/analyzer" }
fusion-profiler = { path = "../../../registry/crates/profiler/" }
fusion-audit = { path = "../../../registry/crates/audit/" }
fusion-deploy = { path = "../../../registry/crates/deploy/" }
fusion-settings = { path = "../../crates/settings" }
fusion-projects = { path = "../../crates/projects" }
fusion-github = { path = "../../../registry/crates/github/" }
lazy_static = "1.4"

