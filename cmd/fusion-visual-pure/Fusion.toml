[package]
name = "fusion-visual-compiler"
version = "1.0.0"
edition = "2024"
authors = ["QuantumSecure Technologies Ltd"]
description = "Fusion Visual Compiler - Built entirely in Fusion"
license = "MIT OR Apache-2.0"

[dependencies]
# Fusion Standard Library
fusion-std = "0.2"

# Fusion Runtime (Supernova v3.0)
fusion-runtime = { version = "3.0", features = ["full", "gpu", "wasm", "distributed"] }

# Fusion Web Framework
fusion-web = "0.2"

# Fusion AI Core
fusion-ai = { version = "0.2", features = ["autodiff", "gpu"] }

# Fusion Quantum SDK
fusion-quantum = "0.2"

# Serialization (built-in)
fusion-serde = { version = "0.2", features = ["derive", "json", "toml"] }

# CLI Framework
fusion-cli = "0.2"

# Async utilities
fusion-async = "0.2"

[build]
target = "native"
optimization = "release"
parallel = true

[features]
default = ["full"]
full = ["desktop", "web", "quantum"]
desktop = ["fusion-runtime/tauri"]
web = ["fusion-web/ssr"]
quantum = ["fusion-quantum/simulator"]

[forge]
# Fusion Forge build configuration
resolver = "flux-v2"
cache = true
incremental = true

[desktop]
# Desktop app configuration (Tauri equivalent)
name = "Fusion Visual Compiler"
identifier = "com.quantumsecure.fusion-visual"
icon = "assets/icon.png"
width = 1400
height = 800
resizable = true
installers = ["msi", "nsis"]

[dev-dependencies]
fusion-test = "0.2"
fusion-bench = "0.2"
