[package]
name = "fusion-visual-desktop"
version = "1.0.0"
edition = "2021"
authors = ["QuantumSecure Technologies Ltd"]
description = "Fusion Visual Compiler - Desktop Edition"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
# Tauri for native desktop
tauri = { version = "1.5", features = ["shell-open"] }
serde = { workspace = true }
serde_json = { workspace = true }

# Fusion Core Components
fusion-runtime-core-v3-supernova = { path = "../../registry/crates/fusion-runtime-core-v3-supernova" }
fusion_core = { workspace = true }
fusion_ai_core = { workspace = true }

# Async Runtime
tokio = { workspace = true }
futures = { workspace = true }

# Error Handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
fusion_std = "1.0.0"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[target.'cfg(windows)'.dependencies]
windows = { version = "0.52", features = ["Win32_Foundation", "Win32_System_Threading"] }
