[package]
name = "fusion-coder"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Team"]
description = "Fusion VSC CLI Coder - Advanced agent orchestration CLI"
license = "MIT OR Apache-2.0"

[[bin]]
name = "fusion-coder"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "cargo", "env"] }
reactor-cli = { path = "../reactor-cli", version = "0.1.0" }

# TUI
ratatui = "0.26.0"
crossterm = "0.27.0"

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Other utilities
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5.0"

# Fusion crates
fusion-agent-core = { path = "../../crates/fusion-agent-core" }
fusion-task-groups = { path = "../../crates/fusion-task-groups" }
fusion-review-policy = { path = "../../crates/fusion-review-policy" }
fusion-browser-agent = { path = "../../crates/fusion-browser-agent" }
fusion-settings = { path = "../../crates/fusion-settings" }
fusion-toolchain = { path = "../../crates/toolchain" }
fusion_std = "1.0.0"
colored = "2.0"
which = "6.0"

[dev-dependencies]
tempfile = "3.8"
