[package]
name = "fusion-visual-native"
version = "1.0.0"
edition = "2021"
authors = ["QuantumSecure Technologies Ltd"]
description = "Fusion Visual Compiler - Native Edition (Supernova + Forge + Reactor)"

[[bin]]
name = "fusion-visual-native"
path = "src/main.rs"

[dependencies]
# Fusion Core Components
fusion-runtime-core-v3-supernova = { path = "../../registry/crates/fusion-runtime-core-v3-supernova" }
fusion-forge = { path = "../../tools/forge" }
reactor-cli = { path = "../reactor-cli" }
fusion_core = { workspace = true }
fusion_ai_core = { workspace = true }

# Web Server
axum = { workspace = true }
tower = { workspace = true }
tower-http = { version = "0.5", features = ["cors", "fs", "trace"] }

# Async Runtime
tokio = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }

# Error Handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# CLI
clap = { workspace = true }
colored = "2.1"

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
num_cpus = { workspace = true }
fusion_std = "1.0.0"

[features]
default = ["full"]
full = ["gpu", "wasm", "distributed"]
gpu = ["fusion-runtime-core-v3-supernova/gpu"]
wasm = ["fusion-runtime-core-v3-supernova/wasm"]
distributed = ["fusion-runtime-core-v3-supernova/distributed"]
