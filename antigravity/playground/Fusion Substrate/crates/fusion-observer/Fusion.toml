[package]
name = "fusion-observer"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }
fusion-blockchain-anchor = { path = "../fusion-blockchain-anchor" }
fusion_std = "1.0.0"

[dev-dependencies]
tempfile = "3.8"
