[package]
name = "fusion-watcher"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Language Team"]
license = "MIT OR Apache-2.0"
description = "File system watcher with debouncing for incremental builds"

[dependencies]
notify = "6.1"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
fusion_std = "1.0.0"

[dev-dependencies]
tempfile = "3.8"
