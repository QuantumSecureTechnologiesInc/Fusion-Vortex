# Dependabot Configuration for Fusion Programming Language
# Automated dependency updates for security and version management
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Rust/Cargo dependencies (main compiler project)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
      - "automated"
    commit-message:
      prefix: "deps(cargo)"
      include: "scope"
    # Group compatible updates together
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "dev-dependencies:*"
      dev-dependencies:
        dependency-type: "development"

  # npm dependencies (VS Code extension)
  - package-ecosystem: "npm"
    directory: "/editors/vscode-fusion"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "vscode-extension"
      - "automated"
    commit-message:
      prefix: "deps(npm)"
      prefix-development: "deps(npm-dev)"
      include: "scope"
    versioning-strategy: "increase"
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "@typescript-eslint/*"
      dev-dependencies:
        dependency-type: "development"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

# Security updates are automatically enabled and get higher priority
# They will be created immediately when vulnerabilities are detected
# regardless of the schedule above
