# Dependabot Configuration for Fusion Programming Language
# Automated dependency updates for security and version management
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Rust/Cargo dependencies (main compiler project)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "QuantumSecureTechnologiesInc"
    labels:
      - "dependencies"
      - "rust"
      - "automated"
    commit-message:
      prefix: "deps(cargo)"
      include: "scope"
    # Group compatible updates together
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "dev-dependencies:*"
      dev-dependencies:
        dependency-type: "development"
    # Security updates get priority
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Ignore specific dependencies if needed
    ignore:
      # Example: ignore specific versions
      # - dependency-name: "some-crate"
      #   versions: ["1.x", "2.x"]

  # npm dependencies (VS Code extension)
  - package-ecosystem: "npm"
    directory: "/editors/vscode-fusion"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "QuantumSecureTechnologiesInc"
    labels:
      - "dependencies"
      - "npm"
      - "vscode-extension"
      - "automated"
    commit-message:
      prefix: "deps(npm)"
      prefix-development: "deps(npm-dev)"
      include: "scope"
    versioning-strategy: "increase"
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "@typescript-eslint/*"
      dev-dependencies:
        dependency-type: "development"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "QuantumSecureTechnologiesInc"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker (if we add Dockerfiles in the future)
  # - package-ecosystem: "docker"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #     day: "thursday"
  #   labels:
  #     - "dependencies"
  #     - "docker"
# Security updates are automatically enabled and get higher priority
# They will be created immediately when vulnerabilities are detected
# regardless of the schedule above
