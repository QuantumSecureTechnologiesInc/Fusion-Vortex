name: Fusion Build Policy Enforcement

on:
    push:
        branches: [main, develop, "release/**"]
    pull_request:
        branches: [main, develop]

env:
    FUSION_FLUX_ENABLED: true
    FUSION_STRICT_MODE: true
    ALLOW_CARGO_FALLBACK: false
    RUST_BACKTRACE: 1

jobs:
    policy-check:
        name: Build Policy Compliance
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Check for policy violations
              run: |
                  echo "🔍 Checking for prohibited cargo commands..."

                  # Check workflow files
                  if grep -rn "cargo build\|cargo test\|cargo run" .github/workflows/ --exclude="*flux*" | grep -v "fusion_flux" | grep -v "ci.yml" | grep -v "enforce-build-policy.yml"; then
                    echo "❌ Found prohibited cargo commands in workflows"
                    echo "Use 'fusion build/test/run' instead"
                    exit 1
                  fi

                  # Check scripts
                  if [ -d "scripts" ] && grep -r "cargo build\|cargo test\|cargo run" scripts/; then
                    echo "❌ Found prohibited cargo commands in scripts"
                    exit 1
                  fi

                  echo "✅ No policy violations detected"

            - name: Verify policy files exist
              run: |
                  if [ ! -f "BUILD_POLICY.md" ]; then
                    echo "❌ BUILD_POLICY.md is missing"
                    exit 1
                  fi

                  if [ ! -f ".fusion/build-policy.json" ]; then
                    echo "❌ .fusion/build-policy.json is missing"
                    exit 1
                  fi

                  echo "✅ Policy files present"

    build-flux-engine:
        name: Build Fusion Flux Engine
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-13]

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo registry
              uses: actions/cache@v6
              with:
                  path: ~/.cargo/registry
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo index
              uses: actions/cache@v6
              with:
                  path: ~/.cargo/git
                  key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache Flux build
              uses: actions/cache@v6
              with:
                  path: runtime/target
                  key: ${{ runner.os }}-flux-${{ hashFiles('runtime/Cargo.lock') }}

            - name: Build Fusion Flux Engine
              run: |
                  cd runtime/crates/fusion_flux_resolve
                  cargo build --release
                  cargo test --release

            - name: Verify Flux binary
              shell: bash
              run: |
                  if [ "$RUNNER_OS" == "Windows" ]; then
                    ls runtime/target/release/fusion_flux_resolve.dll
                  elif [ "$RUNNER_OS" == "macOS" ]; then
                    ls runtime/target/release/libfusion_flux_resolve.dylib
                  else
                    ls runtime/target/release/libfusion_flux_resolve.so
                  fi

            - name: Upload Flux artifact
              uses: actions/upload-artifact@v7
              with:
                  name: fusion-flux-${{ matrix.os }}
                  path: |
                      runtime/target/release/fusion_flux_resolve*
                      runtime/target/release/libfusion_flux_resolve*

    enforce-fusion-builds:
        name: Enforce Fusion Builds
        runs-on: ubuntu-latest
        needs: build-flux-engine

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download Flux Engine
              uses: actions/download-artifact@v8
              with:
                  name: fusion-flux-ubuntu-latest
                  path: runtime/target/release/

            - name: Make enforcement script executable
              run: chmod +x .scripts/enforce-flux-build.sh

            - name: Test enforcement (should block cargo)
              run: |
                  export FUSION_STRICT_MODE=true
                  if .scripts/enforce-flux-build.sh build 2>&1 | grep -q "POLICY VIOLATION"; then
                    echo "✅ Enforcement working - cargo blocked"
                  else
                    echo "❌ Enforcement failed - cargo not blocked"
                    exit 1
                  fi

            - name: Test Fusion build path
              run: |
                  export FUSION_STRICT_MODE=false
                  export FUSION_FLUX_ENABLED=true
                  .scripts/enforce-flux-build.sh check

            - name: Report compliance
              run: |
                  echo "✅ Fusion Flux Engine: Enforced"
                  echo "✅ Strict Mode: Active"
                  echo "✅ Cargo Fallback: Disabled"
                  echo "✅ Policy Compliance: PASS"
