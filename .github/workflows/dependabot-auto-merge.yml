name: Auto-merge Dependabot PRs

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: write
    pull-requests: write

jobs:
    auto-merge:
        runs-on: ubuntu-latest
        # Only run on Dependabot PRs
        if: github.actor == 'dependabot[bot]'

        steps:
            - name: Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@v3
              with:
                  github-token: "${{ secrets.GITHUB_TOKEN }}"

            - name: Auto-approve PR
              # Auto-approve patch and minor updates
              if: |
                  steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
                  steps.metadata.outputs.update-type == 'version-update:semver-minor'
              run: |
                  gh pr review --approve "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Enable auto-merge for Dependabot PRs
              # Auto-merge patch and minor updates after CI passes
              if: |
                  steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
                  steps.metadata.outputs.update-type == 'version-update:semver-minor'
              run: |
                  gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Comment on major updates
              # Add comment for major version updates (manual review required)
              if: steps.metadata.outputs.update-type == 'version-update:semver-major'
              run: |
                  gh pr comment "$PR_URL" --body "⚠️ **Major version update detected**. This PR requires manual review before merging."
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
