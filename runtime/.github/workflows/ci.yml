name: Fusion Runtime CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Static Analysis
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "runtime -> target"
      
      - name: Format Check
        working-directory: runtime
        run: cargo fmt --all -- --check
      
      - name: Clippy
        working-directory: runtime
        run: cargo clippy --workspace --all-targets --features simulation -- -D warnings
      
      - name: Security Audit
        uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Simulation Test Suite
  test-simulation:
    name: Simulation Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "runtime -> target"
      
      - name: Run Unit Tests
        working-directory: runtime
        run: cargo test --workspace --features simulation
      
      - name: Run Doc Tests
        working-directory: runtime
        run: cargo test --doc --workspace

  # Build Release
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    needs: test-simulation
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "runtime -> target"
      
      - name: Build Release (Simulation)
        working-directory: runtime
        run: cargo build --release --package fusion_runtime_core --features simulation

  # Benchmarks (nightly only)
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test-simulation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "runtime -> target"
      
      - name: Run Benchmarks
        working-directory: runtime
        run: cargo bench --workspace --features simulation -- --noplot
      
      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: runtime/target/criterion

  # GPU Tests (requires self-hosted runner with CUDA)
  test-gpu:
    name: GPU Integration Tests
    runs-on: [self-hosted, gpu]
    needs: test-simulation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Check CUDA Installation
        run: nvidia-smi
      
      - name: Build with GPU Support
        working-directory: runtime
        run: cargo build --package fusion_hal --features gpu
      
      - name: Run GPU Tests
        working-directory: runtime
        run: cargo test --package fusion_hal --features gpu

  # Documentation
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Build Docs
        working-directory: runtime
        run: cargo doc --workspace --no-deps --features simulation
      
      - name: Upload Documentation
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: runtime/target/doc
