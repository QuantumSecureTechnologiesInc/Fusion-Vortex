[package]
name = "fusion_hal"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Hardware Abstraction Layer with CUDA backend and pinned thread pools for Fusion Runtime"
build = "build.rs"

[dependencies]
# Core dependencies
thiserror = "1.0"
tracing = { workspace = true }
parking_lot = { workspace = true }

# Thread pool dependencies
crossbeam-deque = "0.8"
core_affinity = "0.8"
num_cpus = "1.16"

# FFI for CUDA
libc = { workspace = true }

[build-dependencies]
cc = { version = "1.0", features = ["parallel"] }

[features]
default = []
gpu = []
simulation = []
hft = []

[dev-dependencies]
proptest = { workspace = true }
