[workspace]

[package]
name = "fusion_runtime_core_evolution"
version = "3.0.0"
edition = "2024"
authors = ["Fusion Arch Team <support@quantumsecuretechnologies.co.uk>"]
description = "Fusion Runtime Core Evolution (Supernova kernel reference)"
publish = false

[dependencies]
crossbeam = { version = "0.8" }
futures-task = { version = "0.3" }
num_cpus = { version = "1.16.0" }
libc = { version = "0.2" }
io-uring = { version = "0.6" }
rand = { version = "0.8" }
sha2 = { version = "0.10" }
hkdf = { version = "0.12" }
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
pqcrypto-kyber = { version = "0.8" }
pqcrypto-traits = { version = "0.3" }
wasmtime = { version = "24.0", features = ["async", "component-model"] }
wasmtime-wasi = { version = "24.0" }
anyhow = { version = "1.0" }

[lib]
name = "fusion_runtime_core_evolution"
path = "src/lib.rs"
crate-type = ["lib"]
