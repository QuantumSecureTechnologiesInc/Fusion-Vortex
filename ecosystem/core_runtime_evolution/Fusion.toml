[package]
name = "fusion_runtime_core_evolution"
version = "3.0.0"
edition = "2024"
authors = ["Fusion Arch Team <support@quantumsecuretechnologies.co.uk>"]
description = "Fusion Runtime Core Evolution (Supernova kernel reference)"
publish = false

[lib]
name = "fusion_runtime_core_evolution"
path = "src/lib.rs"
crate-type = ["lib"]

[dependencies]
# Async Runtime & Concurrency
crossbeam = "0.8"
futures-task = "0.3"
num_cpus = "1.16.0"

# Metal Drivers & IO
libc = "0.2"
io-uring = "0.6"

# Cryptography (Hybrid PQC)
rand = "0.8"
sha2 = "0.10"
hkdf = "0.12"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
pqcrypto-kyber = "0.8"
pqcrypto-traits = "0.3"

# WebAssembly Runtime
wasmtime = { version = "16.0", features = ["async", "component-model"] }
wasmtime-wasi = "16.0"

# Telemetry & Utilities
anyhow = "1.0"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true
