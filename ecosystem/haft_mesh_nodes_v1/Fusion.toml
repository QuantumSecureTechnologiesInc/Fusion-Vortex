[package]
name = "haft_mesh_nodes_v1"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Arch Team <support@quantumsecuretechnologies.co.uk>"]
description = "HAFT Mesh Nodes v1.0"
publish = false

[lib]
name = "haft_mesh_nodes_v1"
path = "src/lib.rs"
crate-type = ["lib"]

[[bin]]
name = "haft_solver"
path = "bin/haft_solver.rs"
doc = false

[[bin]]
name = "haft_vault"
path = "bin/haft_vault.rs"
doc = false

[[bin]]
name = "haft_nexus"
path = "bin/haft_nexus.rs"
doc = false

[[bin]]
name = "haft_warden"
path = "bin/haft_warden.rs"
doc = false

[dependencies]
# Runtime dependency
fusion_runtime_core = { path = "../../registry/crates/fusion_runtime_core" }

# Async Runtime & Concurrency
crossbeam = "0.8"
futures-task = "0.3"
parking_lot = "0.12"
num_cpus = "1.16.0"

# Metal Drivers & IO
libc = "0.2"
io-uring = "0.6"

# Cryptography (Hybrid PQC)
rand = "0.8"
sha2 = "0.10"
hkdf = "0.12"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
pqcrypto-kyber = "0.8"
pqcrypto-traits = "0.3"

# WebAssembly Runtime
wasmtime = { version = "16.0", features = ["async", "component-model"] }
wasmtime-wasi = "16.0"

# Telemetry & Utilities
anyhow = "1.0"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true
