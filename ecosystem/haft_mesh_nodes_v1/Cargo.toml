[package]
name = "haft_mesh_nodes_v1"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Arch Team <support@quantumsecuretechnologies.co.uk>"]
description = "HAFT Mesh Nodes v1.0"
publish = false

[dependencies]
fusion_runtime_core = { path = "/mnt/c/Projects/Fusion - Programming Language/registry/crates/fusion_runtime_core" }
crossbeam = { version = "0.8" }
futures-task = { version = "0.3" }
parking_lot = { version = "0.12" }
num_cpus = { version = "1.16.0" }
libc = { version = "0.2" }
io-uring = { version = "0.6" }
rand = { version = "0.8" }
sha2 = { version = "0.10" }
hkdf = { version = "0.12" }
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
pqcrypto-kyber = { version = "0.8" }
pqcrypto-traits = { version = "0.3" }
wasmtime = { version = "16.0", features = ["async", "component-model"] }
wasmtime-wasi = { version = "16.0" }
anyhow = { version = "1.0" }

[[bin]]
name = "haft_solver"
path = "bin/haft_solver.rs"
doc = false

[[bin]]
name = "haft_vault"
path = "bin/haft_vault.rs"
doc = false

[[bin]]
name = "haft_nexus"
path = "bin/haft_nexus.rs"
doc = false

[[bin]]
name = "haft_warden"
path = "bin/haft_warden.rs"
doc = false

[lib]
name = "haft_mesh_nodes_v1"
path = "src/lib.rs"
crate-type = ["lib"]
