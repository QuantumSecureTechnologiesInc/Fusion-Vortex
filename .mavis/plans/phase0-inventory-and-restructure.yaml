version: 1
plan:
  name: 'Fusion v2.0 Vortex — Phase 0: Honest inventory and folder restructure'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 10
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: 'inventory'
    title: 'File inventory of the entire workspace'
    prompt: |-
      You are fusion-cartographer. Read your agent.md for full scope, classification categories, and stop conditions.

      Walk the entire repo at `C:\Users\Matth\Downloads\Fusion v2.0 Vortex\` using a PowerShell script (recursive `Get-ChildItem -File`). Skip `.git/` contents — record only presence + total size.

      Produce exactly two outputs:
        1. `inventory/manifest.json` — machine-readable; for every file record: relative path, size in bytes, last-modified UTC timestamp, classification (one of 12), parent directory category, sha256 (only for files under 1 MB).
        2. `inventory/INVENTORY_REPORT.md` — human-readable with summary tables: total files, total bytes, count per classification, top-20 largest files, top-20 oldest files, duplicates detected (group by `(filename_stem, size)`).

      Use `Read` / `Write` tools for the JSON / Markdown content. Use PowerShell only for the recursive walk and SHA256 / JSON serialization. Pass `-Encoding UTF8` everywhere.

      Self-verify before reporting done:
        - Both files exist at the paths above.
        - Total file count in `manifest.json` matches `(Get-ChildItem -Recurse -File -Force | Where-Object { $_.FullName -notlike '*.git\*' }).Count` ±2.
        - `INVENTORY_REPORT.md` has all required tables.
        - Every one of the 12 classification categories either has a non-zero count or is explicitly noted as empty.

      When done, post a one-paragraph summary to Mavis (the orchestrator, Mavis session id `mvs_af6a845e837345f38a18417fa7dad958`) via `mavis communication send` including: total file count, total bytes, biggest category, biggest single file, count of `converted-rust-masquerade` files, count of `aspirational-doc` files.
    assigned_to: fusion-cartographer
    verified_by: verifier
    verify_prompt: |-
      Independently re-derive these numbers and compare to `inventory/manifest.json`:

      1. `Get-ChildItem -Recurse -File -Force | Where-Object { $_.FullName -notlike '*.git\*' } | Measure-Object` — total file count. Compare to manifest count (±2 OK because the inventory walk writes its own files).
      2. `Get-ChildItem -Recurse -File -Force | Where-Object { $_.FullName -notlike '*.git\*' } | Measure-Object -Property Length -Sum` — total bytes. Compare to manifest total.
      3. Pick 5 random files and confirm each appears in the manifest with the correct classification. Pick at least one file from each of: `src/compiler/`, `crates/fuc/`, `runtime/native/`, `registry/crates/`, `docs/`.

      Open `inventory/INVENTORY_REPORT.md` and confirm:
        - Summary tables present (total files, total size, per-class counts).
        - Top-20 largest files section present.
        - Duplicates section present (even if empty).
        - Every one of the 12 categories either has a count or is noted as empty.

      PASS only if counts match within tolerance, spot-checks all pass, and report structure is complete. FAIL with specifics (which file path, which count, which section) otherwise.
    max_retries: 2
    timeout_ms: 1800000

  - id: 'doc-audit'
    title: 'Documentation truth audit'
    prompt: |-
      You are fusion-truthseeker. Read your agent.md for full scope, claim extraction rules, and stop conditions.

      Audit every top-level `.md` file in `C:\Users\Matth\Downloads\Fusion v2.0 Vortex\` (skip `.git/`). Required files / globs: `README.md`, `PURE_FUSION_*.md` at root, `docs/guides/*.md`, `docs/features/*.md`, `docs/book/*.md`, `docs/security/*.md`, any other `.md` files at repo root or first-level subdirectories.

      For each file, extract every factual claim and mark `PASS`, `FAIL`, or `UNVERIFIED` with the evidence (file path + line / command used). Pay special attention to the patterns called out in your agent.md (self-hosting claim, converted-Rust-masquerade claim, crate counts, PQC / quantum / AI claims, "first to do X" marketing claims).

      Produce: `docs-truth-audit/TRUTH_REPORT.md`.

      Structure:
        - Top summary block: total claims audited, PASS count, FAIL count, UNVERIFIED count.
        - Top-10 most-distorting FAIL claims list.
        - One section per audited `.md` file, each containing a markdown table with columns: `Claim | Source Line | Verdict | Evidence`.

      Self-verify before reporting done:
        - Report exists at the path above.
        - Every audited `.md` file has at least 3 claims, or is noted as "no factual claims found".
        - Top summary block has all four totals.
        - Top-10 FAIL list has at least 3 entries if any FAILs exist (or is explicitly "no FAILs found").

      When done, post a one-paragraph summary to Mavis (`mvs_af6a845e837345f38a18417fa7dad958`) via `mavis communication send` including: total claims audited, FAIL count, top 3 most-damaging FAILs.
    assigned_to: fusion-truthseeker
    verified_by: verifier
    verify_prompt: |-
      Independently verify:

      1. `docs-truth-audit/TRUTH_REPORT.md` exists.
      2. Open the report. Confirm summary block at top has all four totals (audited / PASS / FAIL / UNVERIFIED) as actual numbers.
      3. Pick 2 random FAIL claims from the report. Open the cited source file and confirm the actual state really does contradict the claim.
      4. Pick 2 random PASS claims from the report. Open the cited source file and confirm the actual state really does match the claim.
      5. Pick 1 random UNVERIFIED claim and confirm it is genuinely ambiguous (not obviously PASS or FAIL).
      6. Confirm every top-level `.md` file mentioned in the report exists.

      PASS only if all 6 checks succeed. FAIL with specific claim + path otherwise.
    max_retries: 2
    timeout_ms: 1800000

  - id: 'restructure-plan'
    title: 'Restructure plan from inventory + truth audit'
    prompt: |-
      You are fusion-curator. Read your agent.md for full scope, action categories, and constraints.

      Read both upstream artifacts:
        - `inventory/INVENTORY_REPORT.md`
        - `docs-truth-audit/TRUTH_REPORT.md`

      Design the post-Phase-0 directory layout. Classify every file in the inventory into exactly one action: `KEEP_AS_IS`, `RELOCATE`, `ARCHIVE`, `TRASH`, `REWRITE`, `FLAG_FOR_HUMAN`. Apply the constraints in your agent.md — preserve `crates/fuc/`, `runtime/native/`, `bin/fuc.exe`, archive `hello.fu` / `compiler.fu` under `.archive/toy-compiler/`, default to ARCHIVE not TRASH for `registry/crates/` (insufficient evidence to wholesale-trash), TRASH all `.tmp_*.fu`, `build_*.log`, root `*.o`, root `*.exe`, root `*.lib`, root `*.a`, the four `target_*` dirs, and duplicate-doc underscored variants.

      Produce: `restructure/RESTRUCTURE_PLAN.md` with the 5 sections specified in your agent.md:
        1. Executive summary (totals per action, expected disk impact).
        2. Target layout (proposed top-level directory tree).
        3. Action lists (one table per category, columns `Path | Reason | Command`).
        4. Risks & rollback (`mavis-trash` is recoverable; `git mv` keeps history).
        5. What this plan deliberately does NOT touch (deferred items).

      Self-verify before reporting done:
        - Plan exists at the path above.
        - Every file from the inventory appears in exactly one action category (or `FLAG_FOR_HUMAN`).
        - Executive summary includes: total files, count per action, total bytes freed by TRASH + ARCHIVE.
        - Each section has concrete commands (`git mv`, `mavis-trash`, `Copy-Item + mavis-trash`) — not vague "move X to Y".

      When done, post a one-paragraph summary to Mavis (`mvs_af6a845e837345f38a18417fa7dad958`) via `mavis communication send` including: count per action, biggest TRASH category, biggest ARCHIVE category, number of `FLAG_FOR_HUMAN` items.
    assigned_to: fusion-curator
    depends_on: ['inventory', 'doc-audit']
    max_retries: 1
    verify_skip_reason: |-
      Restructure plan is a design document. The downstream execution task (`execute-restructure`) is the real verification gate — if the plan is wrong, the executor will surface the error against the actual filesystem. The orchestrator (Mavis) will review the plan directly before launching execution.
    timeout_ms: 900000

  - id: 'execute-restructure'
    title: 'Execute the restructure plan'
    prompt: |-
      You are the coder agent. Read `restructure/RESTRUCTURE_PLAN.md` end-to-end before doing anything. Then execute each action in order, with a git commit per major group.

      For each entry in the plan:
        - `KEEP_AS_IS`: do nothing, move on.
        - `RELOCATE`: use `git mv <from> <to>` for tracked files (history follows). For untracked, use `Copy-Item` then `mavis-trash` on the source.
        - `ARCHIVE`: ensure `.archive/<category>/` exists (`New-Item -ItemType Directory -Force`), then `git mv` (or Copy-Item + mavis-trash for untracked) to put the file under `.archive/<category>/<original-relative-path>`.
        - `TRASH`: `mavis-trash <path>`. NEVER use `Remove-Item -Recurse -Force`, `rm -rf`, `del`, `rd`, or `cmd /c`. mavis-trash is recoverable.
        - `REWRITE`: do NOT modify `.fu` files. Append the path to `restructure/REWRITE_NEEDED.md` as a single bullet list. Leave files in place for the future compiler team.
        - `FLAG_FOR_HUMAN`: do nothing. The plan already lists them for human review.

      Hard rules — refuse to violate:
        - Never delete `Cargo.toml`, `crates/fuc/`, `runtime/native/`, `bin/fuc.exe`, `Fusion.toml`, `.gitignore`, `.git/`. These are kept unless the plan explicitly says otherwise (it shouldn't).
        - Prefer `git mv` so history follows.
        - If a `git mv` fails because the file is not tracked, fall back to `Copy-Item` + `mavis-trash`.
        - If `mavis-trash` is missing on PATH, stop and report to Mavis — do NOT fall back to `Remove-Item`.

      Commit cadence: one commit per major action group, in this order — `chore(phase0): keep-as-is baseline`, then per RELOCATE group, then per ARCHIVE group, then per TRASH group. Final commit: `chore(phase0): restructure complete`.

      Self-verify before reporting done:
        - Every action in the plan was executed or explicitly deferred with reason.
        - `git status` is clean at the end (excluding the inventory / restructure / docs-truth-audit directories which the other agents own).
        - `cargo check --manifest-path crates/fuc/Cargo.toml` exits 0 (if Rust toolchain is on PATH — if not, report "rustc not available" and skip).
        - The plan is preserved at `restructure/RESTRUCTURE_PLAN.md` (do NOT delete it).

      When done, post a one-paragraph summary to Mavis (`mvs_af6a845e837345f38a18417fa7dad958`) via `mavis communication send` including: count of files moved, count trashed, count archived, anything that failed, anything needing human decision.
    assigned_to: coder
    depends_on: ['restructure-plan']
    verified_by: verifier
    verify_prompt: |-
      Independently verify the restructure was executed correctly against `restructure/RESTRUCTURE_PLAN.md`:

      1. For each `RELOCATE` in the plan: confirm the file now exists at the target path (`Test-Path`).
      2. For each `ARCHIVE` in the plan: confirm the file is now under `.archive/<category>/`.
      3. For each `TRASH` in the plan: confirm the file no longer exists at the original path.
      4. For each `KEEP_AS_IS`: confirm it still exists at its original path.
      5. Cross-check: the count of files at the target paths should equal `KEEP_AS_IS` count + `RELOCATE` count.
      6. Spot-check 3 random files (one from each of RELOCATE / ARCHIVE / TRASH): open them, confirm content is intact and is the file we expected.
      7. `git log --oneline -20` — confirm the expected commits are present in order.
      8. Confirm `Cargo.toml` and `crates/fuc/Cargo.toml` still exist.
      9. Confirm `bin/fuc.exe` still exists (or was intentionally trashed — check plan).
      10. `cargo check --manifest-path crates/fuc/Cargo.toml` — exit code 0 (if Rust toolchain available; if not, note "rustc not available").

      PASS only if all 10 checks succeed. FAIL with specific mismatches (path expected vs actual) otherwise.
    max_retries: 1
    timeout_ms: 1800000

  - id: 'final-gate'
    title: 'End-to-end gate: clean tree, expected layout'
    role: verify-as-task
    prompt: |-
      Final end-to-end check after Phase 0 restructure. This is the trust anchor for the whole plan.

      Verify:
        1. `git status` shows clean tree (no uncommitted changes outside `.mavis/`).
        2. `git log --oneline -20` shows the expected restructure commits in order.
        3. Repo top-level no longer contains `compiler_v*.fu`, `build_*.log`, `ninja_*.log`, `cmake_*.log`, `mock_build_error.log`, `firebase-debug.log`, `.tmp_*.fu`, `panic!(...)`, `v`, or any of the `target_*` directories (unless explicitly KEEP_AS_IS in the plan).
        4. `inventory/`, `docs-truth-audit/`, and `restructure/` directories exist and each contains the expected files.
        5. `crates/fuc/`, `runtime/native/`, `bin/fuc.exe` are intact.
        6. If a Rust toolchain is on PATH: `cargo check --manifest-path crates/fuc/Cargo.toml` exits 0.

      Write the verdict to `restructure/FINAL_GATE.md` with PASS or FAIL plus the evidence for each check.

      Report the verdict back to Mavis (`mvs_af6a845e837345f38a18417fa7dad958`) via `mavis communication send`.
    assigned_to: verifier
    depends_on: ['execute-restructure']
    max_retries: 1
    timeout_ms: 600000