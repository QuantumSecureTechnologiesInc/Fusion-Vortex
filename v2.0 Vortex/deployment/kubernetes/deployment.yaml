apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypercycle-vortex
  labels:
    app: hypercycle-vortex
    version: v2.0.2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hypercycle-vortex
  template:
    metadata:
      labels:
        app: hypercycle-vortex
        version: v2.0.2
    spec:
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: vortex
        image: hypercycle/vortex:2.0.2
        imagePullPolicy: IfNotPresent
        
        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        
        # Resource requests and limits
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: hypercycle-config
        
        # Volume mounts
        volumeMounts:
        - name: data
          mountPath: /opt/hypercycle/data
        - name: logs
          mountPath: /opt/hypercycle/logs
        - name: tmp
          mountPath: /tmp
        
        # Health checks
        livenessProbe:
          exec:
            command:
            - /opt/hypercycle/bin/vortex_dashboard
            - --health
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - /opt/hypercycle/bin/vortex_dashboard
            - --health
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
      # Volumes
      volumes:
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      
      # Node affinity (prefer AVX-512 capable nodes)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: cpu.feature.node.kubernetes.io/AVX512F
                operator: In
                values:
                - "true"
