version: '3.8'

services:
  hypercycle-vortex:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    image: hypercycle/vortex:2.0.2
    container_name: hypercycle-vortex
    restart: unless-stopped

    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M

    # Environment variables
    environment:
      - LOG_LEVEL=info
      - ENABLE_METRICS=true

    # Volumes for persistent data
    volumes:
      - vortex-data:/opt/hypercycle/data:rw
      - vortex-logs:/opt/hypercycle/logs:rw
      - /tmp:/tmp:rw

    # Health check
    healthcheck:
      test: [ "/opt/hypercycle/bin/vortex_dashboard", "--health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network
    networks:
      - hypercycle-net

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: hypercycle-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hypercycle-net

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: hypercycle-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - hypercycle-net
    depends_on:
      - prometheus

volumes:
  vortex-data:
  vortex-logs:
  prometheus-data:
  grafana-data:


networks:
  hypercycle-net:
    driver: bridge
