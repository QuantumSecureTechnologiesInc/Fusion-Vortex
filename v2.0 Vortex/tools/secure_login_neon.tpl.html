<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access - Vortex v2.0</title>
    <script>
        // Vortex CLI Verification Logic (Same robust logic, new UI)
        function verifyCode(inputCode) {
            const secret = "VORTEX_QUANTUM_SECURE_KEY_2026";
            const step = 30;
            const now = Math.floor(Date.now() / 1000);
            const timeSlices = [Math.floor(now / step), Math.floor(now / step) - 1, Math.floor(now / step) + 1];
            
            for (let slice of timeSlices) {
                const str = secret + "-" + slice;
                let hash = 5381;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) + hash) + str.charCodeAt(i);
                    hash = hash >>> 0; 
                }
                const generated = (hash % 1000000).toString().padStart(6, '0');
                if (parseInt(generated) === parseInt(inputCode)) {
                    return true;
                }
            }
            return false;
        }

        function handleLogin(e) {
            e.preventDefault();
            const codeInput = document.getElementById('cli-code').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const mainContainer = document.querySelector('.login-card');
            
            errorMsg.style.display = 'none';
            errorMsg.classList.remove('shake');

            if (verifyCode(codeInput)) {
                successMsg.style.display = 'block';
                mainContainer.style.borderColor = '#22c55e'; // Green Border
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.classList.add('shake');
                setTimeout(() => errorMsg.classList.remove('shake'), 500);
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e6ed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Abstract Background Elements */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(96, 165, 250, 0.05) 0%, transparent 50%);
            animation: rotate 60s linear infinite;
            z-index: 0;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 39, 73, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.2);
            text-align: center;
            transition: all 0.3s ease;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 180px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95em;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-label {
            display: block;
            color: #60a5fa;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .cli-code-input {
            width: 100%;
            padding: 15px;
            background: rgba(10, 14, 39, 0.6);
            border: 2px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            color: #fff;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.5em;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: all 0.3s;
        }

        .cli-code-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.2);
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(96, 165, 250, 0.4);
        }

        .status-msg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            display: none;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .cli-hint {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #64748b;
            font-size: 0.85em;
            font-family: monospace;
        }

        .cli-command {
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            color: #a78bfa;
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="data:image/jpeg;base64,{{LOGO_BASE64}}" alt="Vortex Logo" class="brand-logo">
            </div>
            
            <h1>Vortex Access</h1>
            <div class="subtitle">Secure Chaos Monitoring Terminal</div>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label class="input-label">2FA Identification Code</label>
                    <input type="text" id="cli-code" class="cli-code-input" placeholder="000000" maxlength="6" autocomplete="off" autofocus>
                </div>

                <button type="submit" class="btn-verify">Authenticate</button>

                <div id="error-msg" class="status-msg error">Access Denied. Invalid Authorization Token.</div>
                <div id="success-msg" class="status-msg success">Identity Verified. Initializing Uplink...</div>
            </form>

            <div class="cli-hint">
                Generate token via CLI:<br>
                <span class="cli-command">.\vortex.exe 2fa</span>
            </div>
        </div>
    </div>
</body>
</html>
