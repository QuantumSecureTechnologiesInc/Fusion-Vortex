[package]
name = "fusion_core"
version = "0.1.0"
edition = "2021"
description = "Core type system and runtime for the Fusion Programming Language"
authors = ["Fusion Language Team"]
license = "MIT"

[dependencies]
num-complex = "0.4"  # For Quantum amplitudes
serde = { version = "1.0", features = ["derive"] } # For serialization support (Standard Lib req)
rand = "0.8"         # For probabilistic measurement