// examples/package_manager_demo/fusion.toml - Example project manifest

[package]
name = "fusion-demo"
version = "0.1.0"
authors = ["Fusion Developer <dev@fusion-lang.org>"]
edition = "2024"
description = "Demo project showing package management"
license = "MIT"

[dependencies]
# Collections library
collections = "^1.0"

# Utilities
string-utils = "~0.5"

# Optional: ML library (when available)
# ml = { version = "0.1", optional = true }

[dev-dependencies]
# Testing framework
test-framework = "1.0"

[features]
default = []
ml-support = ["ml"]

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3
