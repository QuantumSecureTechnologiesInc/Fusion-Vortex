[package]
name = "ml-mnist-classifier"
version = "0.1.0"
authors = ["Fusion ML Team <ml@fusion-lang.org>"]
edition = "2024"
description = "MNIST digit classifier using CNN"
license = "MIT"

[dependencies]
# Core collections
collections = "^1.0"

# ML library
fusion-ml = "^0.1"

# Data utilities
data-utils = "^0.1"

[dev-dependencies]
test-framework = "^1.0"

[features]
default = ["cpu"]
cpu = []
gpu = ["fusion-ml/gpu"]

[build]
optimization = "release"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = true
