# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

# ── Advisory Database ──────────────────────────────────────────
# Checks crates against the RustSec advisory database for known vulnerabilities
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # pqcrypto ecosystem: PQClean upstream archived July 2026, no upgrade path
    # Migrate to pure-Rust ml-kem/ml-dsa crates when ready
    "RUSTSEC-2026-0161",  # pqcrypto-mlkem unmaintained
    "RUSTSEC-2026-0162",  # pqcrypto-traits unmaintained
    "RUSTSEC-2026-0163",  # pqcrypto-internals unmaintained
    "RUSTSEC-2026-0166",  # pqcrypto-mldsa unmaintained
    # bincode: team ceased development, v1.3.3 considered complete
    "RUSTSEC-2025-0141",
    # paste: no longer maintained, pulled transitively by pqcrypto-mldsa
    "RUSTSEC-2024-0436",
]

# ── License Checks ─────────────────────────────────────────────
# Ensures all crates use compatible open-source licenses
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
]
confidence-threshold = 0.8
# Ring uses a custom OpenSSL-like license
exceptions = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

# Critical crates that must stay pinned
deny = [
    # Prevent accidental LLVM version mismatch
    # { crate = "inkwell", reason = "Must match system LLVM 20.1.8" },
]

# ── Source Restrictions ────────────────────────────────────────
# Only allow crates from crates.io and local paths
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
github = ["QuantumSecureTechnologiesInc"]
