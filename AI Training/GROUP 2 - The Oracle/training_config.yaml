# Fusion AI Training Configuration
# GROUP 2: The Oracle - Development Assistant Training

# Base Model Configuration
base_model: "codellama/CodeLlama-13b-Instruct-hf"  # Instruction-tuned base
model_max_length: 4096
tokenizer_padding_side: "right"

# LoRA Configuration (Parameter-Efficient Fine-Tuning)
lora:
  enabled: true
  r: 16  # LoRA rank
  lora_alpha: 32  # LoRA scaling factor
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"
  inference_mode: false

# Training Configuration
training:
  dataset: "GROUP 2 - The Oracle/Stage 1 - Instruction Fine-Tuning/instruction_dataset.jsonl"
  method: "instruction_tuning"
  epochs: 3
  learning_rate: 3e-4  # Higher for LoRA
  warmup_ratio: 0.05
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  optimizer: "paged_adamw_32bit"  # Memory-efficient optimizer
  scheduler: "cosine"
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  output_dir: "./models/fusion-oracle"

# Prompt Template
prompt_template: |
  Below is an instruction that describes a task. Write Fusion code that appropriately completes the request.
  
  ### Instruction:
  {instruction}
  
  ### Input:
  {input}
  
  ### Response:
  {output}

# Instruction Format
instruction_format:
  input_key: "instruction"
  context_key: "input"
  output_key: "output"
  system_prompt: "You are an expert Fusion programming assistant. Generate clean, efficient, and idiomatic Fusion code following best practices."

# Hardware Configuration
hardware:
  device: "cuda"
  mixed_precision: "bf16"
  gradient_checkpointing: true
  num_gpus: 1
  distributed_backend: "nccl"

# Quantization (for memory efficiency)
quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

# Data Processing
data:
  train_val_split: 0.9
  shuffle: true
  seed: 42
  num_workers: 4
  max_samples: -1  # -1 for all samples
  
# Response Generation Parameters
generation:
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  do_sample: true

# Monitoring and Logging
logging:
  wandb_project: "fusion-oracle"
  wandb_run_name: "fusion-dev-assistant-v1"
  log_level: "info"
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: ["wandb", "tensorboard"]

# Evaluation
evaluation:
  eval_strategy: "steps"
  eval_accumulation_steps: 1
  per_device_eval_batch_size: 4
  prediction_loss_only: false
  
# Model Saving
model_saving:
  save_strategy: "steps"
  save_safetensors: true
  push_to_hub: false
  hub_model_id: "fusion-lang/oracle-v1"
  hub_token: "${HF_TOKEN}"
  save_only_lora: true  # Only save LoRA adapters

# Advanced Options
advanced:
  flash_attention_2: true
  use_reentrant: false  # For gradient checkpointing
  optim: "paged_adamw_32bit"
  group_by_length: true  # Efficient batching
  length_column_name: "length"
  ddp_find_unused_parameters: false
  
# SFTTrainer Specific
sft_config:
  dataset_text_field: "text"  # Combined instruction+response
  max_seq_length: 2048
  packing: false  # Don't pack multiple samples
  dataset_num_proc: 4

# Validation Dataset (Optional)
validation:
  enabled: true
  dataset_path: "GROUP 2 - The Oracle/Stage 1 - Instruction Fine-Tuning/validation.jsonl"
  num_samples: 50

# Post-Training
post_training:
  merge_adapters: true  # Merge LoRA back into base model
  output_merged_dir: "./models/fusion-oracle-merged"
  quantize_merged: false
