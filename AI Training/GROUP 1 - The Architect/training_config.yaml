# Fusion AI Training Configuration
# GROUP 1: The Architect - Compiler Intelligence Training

# Base Model Configuration
base_model: "codellama/CodeLlama-13b-hf" # or deepseek-coder, starcoder, etc.
model_max_length: 4096
tokenizer_padding_side: "right"

# Training Pipeline
pipeline:
  - name: "Stage 1 - Fusion Syntax SFT"
    dataset: "GROUP 1 - The Architect/Stage 1 - Fusion Syntax SFT/fusion_syntax_corpus.jsonl"
    method: "sft"
    epochs: 2
    learning_rate: 2e-5
    warmup_ratio: 0.1
    batch_size: 8
    gradient_accumulation_steps: 2
    max_seq_length: 1024
    optimizer: "adamw_torch"
    scheduler: "cosine"
    weight_decay: 0.01
    logging_steps: 10
    save_steps: 100
    eval_steps: 50
    output_dir: "./models/fusion-architect-stage1"

  - name: "Stage 2 - LLVM Optimization Mapping"
    dataset: "GROUP 1 - The Architect/Stage 2 - LLVM Optimization Mapping/fusion_llvm_ir_pairs.jsonl"
    method: "sft"
    epochs: 3
    learning_rate: 1e-5
    warmup_ratio: 0.05
    batch_size: 4
    gradient_accumulation_steps: 4
    max_seq_length: 2048
    optimizer: "adamw_torch"
    scheduler: "cosine"
    weight_decay: 0.01
    logging_steps: 5
    save_steps: 50
    eval_steps: 25
    output_dir: "./models/fusion-architect-stage2"
    load_from: "./models/fusion-architect-stage1"
    preprocessing:
      input_template: "### Fusion Code:\n{fusion_code}\n\n### Optimized LLVM IR:\n"
      output_template: "{llvm_ir}"

  - name: "Stage 3 - Security Invariant Enforcement"
    dataset: "GROUP 1 - The Architect/Stage 3 - Security Invariant Enforcement/security_invariants.jsonl"
    method: "sft"
    epochs: 2
    learning_rate: 1e-5
    warmup_ratio: 0.1
    batch_size: 8
    gradient_accumulation_steps: 2
    max_seq_length: 1024
    optimizer: "adamw_torch"
    scheduler: "cosine"
    weight_decay: 0.01
    logging_steps: 10
    save_steps: 100
    eval_steps: 50
    output_dir: "./models/fusion-architect-stage3"
    load_from: "./models/fusion-architect-stage2"
    preprocessing:
      input_template: "### Analyze this Fusion code for security violations:\n{code}\n\n### Analysis:\n"
      output_template: "Safe: {is_safe}\nExplanation: {explanation}\nViolations: {violations}"

  - name: "Stage 4 - Self-Correction DPO"
    dataset: "GROUP 1 - The Architect/Stage 4 - Self-Correction DPO/preference_pairs.jsonl"
    method: "dpo"
    epochs: 1
    learning_rate: 5e-6
    warmup_ratio: 0.1
    batch_size: 4
    gradient_accumulation_steps: 1
    max_seq_length: 1024
    beta: 0.1 # DPO temperature parameter
    optimizer: "adamw_torch"
    scheduler: "cosine"
    weight_decay: 0.01
    logging_steps: 5
    save_steps: 50
    eval_steps: 25
    output_dir: "./models/fusion-architect-final"
    load_from: "./models/fusion-architect-stage3"

# Hardware Configuration
hardware:
  device: "cuda" # or "cpu", "mps" for Apple Silicon
  mixed_precision: "bf16" # or "fp16", "fp32"
  gradient_checkpointing: true
  num_gpus: 1
  distributed_backend: "nccl" # for multi-GPU

# Data Processing
data:
  train_val_split: 0.9
  shuffle: true
  seed: 42
  num_workers: 4
  prefetch_factor: 2

# Monitoring and Logging
logging:
  wandb_project: "fusion-architect"
  wandb_run_name: "fusion-compiler-intelligence-v1"
  log_level: "info"
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

# Evaluation
evaluation:
  eval_strategy: "steps"
  eval_accumulation_steps: 1
  per_device_eval_batch_size: 8

# Model Saving
model_saving:
  save_strategy: "steps"
  save_safetensors: true
  push_to_hub: false
  hub_model_id: "fusion-lang/architect-v1"
  hub_token: "${HF_TOKEN}"

# Advanced Options
advanced:
  torch_compile: false # Requires PyTorch 2.0+
  flash_attention_2: true # Requires flash-attn package
  use_liger_kernel: false # Optional optimization
  neftune_noise_alpha: 5 # NEFTune augmentation (set to 0 to disable)
