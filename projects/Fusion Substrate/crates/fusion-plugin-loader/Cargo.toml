[package]
name = "fusion-plugin-loader"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Language Team"]
license = "MIT OR Apache-2.0"
description = "WASM-based plugin loader with sandboxing"

[dependencies]
wasmtime = "24.0"
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha3 = "0.10"
hex = "0.4"

[dev-dependencies]
tempfile = "3.8"
wat = "1.0"
