[package]
name = "fusion-verifier"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Language Team"]
license = "MIT OR Apache-2.0"
description = "Zero-knowledge proof generation and verification for tamper-evident execution"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
sha3 = "0.10"
hex = "0.4"
