[workspace]
resolver = "2"
members = [
    "cmd/fusion",
    "crates/core",
    "crates/toolchain",
    "crates/tester",
    "crates/formatter",
    "crates/docgen",
    "crates/pkgmgr",
    "crates/debugger",
    "crates/analyzer",
    "crates/profiler",
    "crates/audit",
    "crates/deploy",
    "crates/ai-core",
    "crates/ai-cli",
    "crates/ai-daemon",
    "crates/ai-models",
    "crates/ai-enhanced",
    "crates/vscode-runtime",
    "crates/settings",
    "crates/projects",
    "crates/github",
    "crates/agents",
    "crates/mcp",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Fusion Language Team"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/fusion-lang/fusion-cli"
homepage = "https://fusionlang.dev"
rust-version = "1.75"

[workspace.dependencies]
# CLI and argument parsing
clap = { version = "4.5", features = ["derive", "cargo", "env"] }
clap_complete = "4.5"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
yaml-rust2 = "0.8"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Crypto (Post-Quantum Cryptography)
pqcrypto = "0.18"
pqcrypto-kyber = "0.8"
pqcrypto-dilithium = "0.5"
sha3 = "0.10"
blake3 = "1.5"

# HTTP and networking
reqwest = { version = "0.11", features = ["json", "rustls-tls", "stream"] }
hyper = { version = "1.0", features = ["full"] }
tower = "0.4"

# Git integration
git2 = "0.18"

# Diff generation
similar = "2.4"
diff = "0.1"

# Date and time
chrono = { version = "0.4", features = ["serde"] }

# Templating
handlebars = "5.1"
tera = "1.19"

# Process management
which = "6.0"

# File watching
notify = "6.1"

# Parser and AST utilities
syn = "2.0"
quote = "1.0"
proc-macro2 = "1.0"

# Testing utilities
proptest = "1.4"
quickcheck = "1.0"

# Benchmarking
criterion = "0.5"

# Additional dependencies for enhanced features
uuid = { version = "1.6", features = ["v4", "serde"] }
shellexpand = "3.1"
async-stream = "0.3"
walkdir = "2.4"
jsonrpc-core = "18.0"
jsonrpc-derive = "18.0"
tower-lsp = "0.20"
tokio-tungstenite = "0.21"
futures-util = "0.3"
tempfile = "3.8"
zip = "0.6"
parking_lot = "0.12"
boa_engine = "0.19"



[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true

[profile.test]
opt-level = 1

[dependencies]
fusion_std = "1.0.0"
