[package]
name = "fusion"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description = "Fusion Programming Language CLI - Main entry point"

[[bin]]
name = "fusion"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
clap = { workspace = true }
clap_complete = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Internal crates
fusion-core = { path = "../../crates/core" }
fusion-toolchain = { path = "../../crates/toolchain" }
fusion-tester = { path = "../../crates/tester" }
fusion-formatter = { path = "../../crates/formatter" }
fusion-docgen = { path = "../../crates/docgen" }
fusion-pkgmgr = { path = "../../crates/pkgmgr" }
fusion-debugger = { path = "../../crates/debugger" }
fusion-analyzer = { path = "../../crates/analyzer" }
fusion-profiler = { path = "../../crates/profiler" }
fusion-audit = { path = "../../crates/audit" }
fusion-deploy = { path = "../../crates/deploy" }
fusion-ai-cli = { path = "../../crates/ai-cli", optional = true }
fusion-settings = { path = "../../crates/settings" }
fusion-projects = { path = "../../crates/projects" }
fusion-github = { path = "../../crates/github" }
fusion-agents = { path = "../../crates/agents", optional = true }
fusion-mcp = { path = "../../crates/mcp" }

lazy_static = "1.4"
fusion_std = "1.0.0"

[features]
default = ["ai"]
ai = ["dep:fusion-ai-cli", "dep:fusion-agents"]

