[package]
name = "projects"
description = "Fusion project workspace and state management"
version = "0.2.0"
edition = "2021"
authors = ["Fusion Team"]
license = "MIT"

[dependencies]
anyhow = { version = "1.0.94" }
thiserror = { version = "2.0.6" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
chrono = { version = "0.4.39", features = ["serde"] }
rusqlite = { version = "0.31", features = ["bundled"] }
dirs = { version = "5.0.1" }
fusion_std = { path = "../../registry/crates/std" }

