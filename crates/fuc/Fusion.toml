[package]
name = "fuc"
version = "0.1.0"
edition = "2021"

[dependencies]
logos = "0.13"
chumsky = "0.9"
ariadne = "0.3"
# Ensure LLVM 20 is installed
inkwell = { git = "https://github.com/TheDan64/inkwell", branch = "master", features = [
  "llvm20-1",
] }
llvm-sys = { version = "201", features = [] }
thiserror = "1.0"
thunderdome = "0.6"
clap = { version = "4.3", features = ["derive"] }
anyhow = "1.0"
fusion_std = "1.0.0"
colored = "2.0"

[dev-dependencies]
# For integration tests
test-generator = "0.3"
tempfile = "3"
