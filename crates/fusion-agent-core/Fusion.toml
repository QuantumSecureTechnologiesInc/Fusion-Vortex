[package]
name = "fusion-agent-core"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Team"]
description = "Core agent orchestration logic for Fusion Coder"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4"] }
chrono = "0.4"
tracing = "0.1"

# Fusion dependencies
fusion-task-groups = { path = "../fusion-task-groups" }
fusion-review-policy = { path = "../fusion-review-policy" }
fusion_std = "1.0.0"
