[package]
name = "fusion-task-groups"
version = "1.0.0"
edition = "2021"
authors = ["Fusion Team"]
description = "Task group management for Fusion Coder agents"
license = "MIT OR Apache-2.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4"] }
chrono = "0.4"
anyhow = "1.0"
fusion_std = "1.0.0"
