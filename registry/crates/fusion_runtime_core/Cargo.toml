[package]
name = "fusion_runtime_core"
description = "Framework: Opinionated heterogeneous runtime for Quantum/AI/Classical hybrid workloads"
keywords = ["runtime", "framework", "quantum", "ai", "fusion"]
categories = ["development-tools::build-utils", "concurrency"]
readme = "README.md"
metadata = { docs = { rs = { all-features = true, rustdoc-args = ["--cfg", "docsrs"] } } }
version = "0.2.0"
edition = "2021"
authors = ["Fusion Team"]
license = "MIT"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"

[dependencies]
fusion_core = { path = "registry/crates/fusion-core", package = "fusion-core" }
fusion_runtime_scheduler = { path = "../fusion_runtime_scheduler/", optional = true }
fusion_runtime_mem_mgr = { path = "../fusion_runtime_mem_mgr/", optional = true }
fusion_runtime_hal = { path = "../fusion_runtime_hal/", optional = true }
fusion_llm_inference_engine = { path = "../llm-inference", optional = true }
fusion_llm_tokenizers = { path = "../llm-tokenizers", optional = true }
parking_lot = { version = "0.12.3" }
crossbeam = { version = "0.8" }
dashmap = { version = "5.5" }
futures = { version = "0.3.31" }
pin-project-lite = { version = "0.2.14" }
tracing = { version = "0.1.41", optional = false }
tracing-subscriber = { version = "0.3.19", optional = true }
metrics = { version = "0.23.0", optional = true }
serde = { version = "1.0.216", features = ["derive", "rc"] }
fusion_std = { path = "registry/crates/std" }

[dev-dependencies]
criterion = { version = "0.5.1" }
proptest = { version = "1.6.0" }

[features]
default = ["full"]
full = ["scheduler", "memory", "hal", "metrics", "llm"]
scheduler = ["fusion_runtime_scheduler"]
memory = ["fusion_runtime_mem_mgr"]
hal = ["fusion_runtime_hal"]
metrics = ["dep:metrics"]
profiling = ["dep:tracing-subscriber"]
llm = ["fusion_llm_inference_engine", "fusion_llm_tokenizers"]
