[package]
name = "fusion_q_ibm_backend"
version = "0.2.0"
edition = "2021"
description = "IBM Quantum (Qiskit) backend provider"
license = "MIT"

[dependencies]
fusion_core = { workspace = true }
fusion_quantum_sdk = { path = "../q-sim", package = "fusion_q_sim" } # Linking to sim as placeholder SDK
reqwest = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

