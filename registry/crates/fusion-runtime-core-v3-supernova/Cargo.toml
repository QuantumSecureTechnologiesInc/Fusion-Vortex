[package]
name = "fusion-runtime-core-v3-supernova"
version = "3.0.0"
edition = "2021"
authors = ["Fusion Core Team"]
description = "Fusion Runtime Core v3.0 Supernova - Unified heterogeneous runtime with native execution, WASM plugins, and distributed capabilities"
license = "MIT OR Apache-2.0"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["runtime", "async", "wasm", "distributed", "quantum"]
categories = ["asynchronous", "wasm", "development-tools"]
readme = "README.md"

[lib]
name = "fusion_runtime_core_v3_supernova"
path = "src/lib.rs"

[features]
default = ["full"]
full = ["wasm", "distributed", "io-uring"]
gpu = ["fusion-cuda-driver"]
wasm = ["wasmtime"]
distributed = ["tonic", "prost"]
io-uring = ["dep:io-uring"]

[dependencies]
# Core async primitives
futures = "0.3"
crossbeam-queue = "0.3"
parking_lot = "0.12"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# WASM engine (production)
wasmtime = { version = "16.0", optional = true, features = ["async", "cranelift"] }

# Distributed runtime
tonic = { version = "0.10", optional = true, features = ["transport"] }
prost = { version = "0.12", optional = true }

# GPU support
fusion-cuda-driver = { path = "../fusion-cuda-driver", optional = true }

# Utilities
num_cpus = "1.16"
log = "0.4"
env_logger = "0.10"

# Linux-specific dependencies
[target.'cfg(target_os = "linux")'.dependencies]
io-uring = { version = "0.6", optional = true }

[build-dependencies]
tonic-build = { version = "0.10", optional = true }

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

[[example]]
name = "supernova_full"
path = "examples/supernova_full.rs"
