[package]
name = "fusion-ai-cli"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Tool: AI-powered CLI with subcommands and workspace management."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "tool", "cli", "ai", "tool"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[dependencies]
fusion_core = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/fusion-core", package = "fusion-core" }
anyhow = { version = "1.0.94" }
thiserror = { version = "2.0.6" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
tokio = { version = "1.42.0", features = ["full", "tracing"] }
tracing = { version = "0.1.41" }
similar = { version = "2.6.0" }
diff = { version = "0.1.13" }
git2 = { version = "0.19.0", default-features = false }
fusion-core = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/fusion-core", package = "fusion-core" }
fusion-ai-core = { path = "/mnt/c/Projects/Fusion - Programming Language/registry/crates/ai-core", version = "0.2.0" }
blake3 = { version = "1.5.0" }
chrono = { version = "0.4.39", features = ["serde"] }
fusion_std = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/std" }
