[package]
name = "std"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Foundation: Fusion standard library extensions and panic-free error handling primitives"
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "error-handling", "std", "primitives"]
categories = ["development-tools", "no-std"]
readme = "README.md"

[dependencies]
async-trait = { version = "0.1.83" }
anyhow = { version = "1.0.94" }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
fusion_core = { path = "../fusion-core", package = "fusion-core" }
libc = { version = "0.2" }
regex = { version = "1.11.1" }
serde = { version = "1.0.216", features = ["derive"] }
serde_json = { version = "1.0.133" }
thiserror = { version = "2.0.6" }
tokio = { version = "1.37", features = ["rt", "time"] }
unicode-normalization = { version = "0.1" }
uuid = { version = "1.7", features = ["v4"] }

[dev-dependencies]
criterion = { version = "0.5.1" }

[features]
default = []

