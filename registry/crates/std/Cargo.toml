[package]
name = "fusion_std"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Foundation: Fusion standard library extensions and panic-free error handling primitives"
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "error-handling", "std", "primitives"]
categories = ["development-tools", "no-std"]
readme = "README.md"

[features]
default = []
# No default features - users opt-in explicitly

[dependencies]
thiserror = { workspace = true }
serde = { workspace = true, optional = true }
fusion_core = { path = "../fusion-core", default-features = false, package = "fusion-core" }
async-trait = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

# [[bench]]
# name = "error_handling"
# harness = false
