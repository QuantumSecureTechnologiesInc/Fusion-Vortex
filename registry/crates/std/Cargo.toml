[package]
name = "fusion_std"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Foundation: Fusion standard library extensions and panic-free error handling primitives"
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "error-handling", "std", "primitives"]
categories = ["development-tools", "no-std"]
readme = "README.md"
metadata = { integrations = { inventory = "../../../docs/Integrations_Inventory.md", reference_bundles = ["registry/crates/std/stdlib_docs/source_files_standard_lib", "registry/crates/std/stdlib_docs/matth_downloads_standard_lib", "registry/crates/std/stdlib_docs/fusion_integrations_3"] } }

[dependencies]
async-trait = { version = "0.1.83" }
anyhow = { version = "1.0.94" }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
fusion_core = { path = "../fusion-core", package = "fusion-core" }
fusion_ai_core = { path = "../ai-core", package = "fusion-ai-core" }
fusion_runtime_core = { path = "../fusion_runtime_core" }
fusion_llm_inference_engine = { path = "../llm-inference" }
fusion_llm_tokenizers = { path = "../llm-tokenizers" }
regex = { version = "1.11.1" }
serde = { version = "1.0.216", features = ["derive"] }
serde_json = { version = "1.0.133" }
thiserror = { version = "2.0.6" }
tokio = { version = "1.37", features = ["rt", "time"] }
unicode-normalization = { version = "0.1" }
uuid = { version = "1.7", features = ["v4"] }

[dev-dependencies]
criterion = { version = "0.5.1" }

[features]
default = []
