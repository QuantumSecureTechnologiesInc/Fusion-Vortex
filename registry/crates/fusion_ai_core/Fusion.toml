[package]
name = "fusion_ai_core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Framework: Opinionated AI/ML framework with autodiff, zero-copy tensors, and GPU acceleration"
keywords = ["ai", "ml", "framework", "autodiff", "tensor"]
categories = ["science", "development-tools"]
readme = "README.md"

[features]
default = ["full"]
full = ["autodiff", "gpu", "distributed"]
autodiff = []
gpu = ["fusion_runtime_core/hal"]
distributed = ["tokio"]

[dependencies]
fusion_core = { workspace = true }
fusion_runtime_core = { workspace = true }
serde = { workspace = true }
tracing = { workspace = true }
ndarray = "0.15"
rand = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true, optional = true }
thiserror = { workspace = true }
fusion_std = "1.0.0"

[dev-dependencies]
criterion = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

