[package]
name = "sentinel-tribrid"
version = "1.0.0"
edition = "2021"
license = "MIT"
description = "Framework: Fusion Framework crate: sentinel-tribrid."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "framework"]
categories = ["development-tools", "framework"]
readme = "README.md"
[dependencies]
# Fusion Runtime (replaces tokio)
fusion_runtime_core = { path = "../fusion_runtime_core" }
fusion_core = { workspace = true }

# Serialization & Persistence
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Cryptography
sha2 = { workspace = true }
hmac = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }

# Error Handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging & Telemetry
tracing = { workspace = true }
parking_lot = { workspace = true }

# Time
chrono = { workspace = true }
tempfile = { workspace = true }
fusion_std = "1.0.0"

[dev-dependencies]
criterion = { workspace = true }

# [[bench]]
# name = "chaos_benchmarks"
# harness = false


