[package]
name = "fusion_runtime_mem_mgr"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Framework: Memory Manager (GC & Allocator) for Fusion Runtime."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["framework", "runtime", "fusion", "memory-management", "allocator"]
categories = ["development-tools", "os::kernel-apis"]
readme = "README.md"

[dependencies]
fusion_core = { path = "../fusion-core", package = "fusion-core" }
parking_lot = { version = "0.12.3" }
libc = { version = "0.2" }
memmap2 = { version = "0.9.4" }
tracing = { version = "0.1.41" }
fusion_std = { path = "../std" }

[dev-dependencies]
criterion = { version = "0.5.1" }
