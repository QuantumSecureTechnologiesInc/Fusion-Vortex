[package]
name = "fusion-mcp"
description = "Framework: Opinionated Model Context Protocol (MCP) framework for AI agent orchestration"
keywords = ["mcp", "ai", "framework", "agent", "orchestration"]
categories = ["development-tools", "web-programming"]
readme = "README.md"
metadata = { docs = { rs = { all-features = true, rustdoc-args = ["--cfg", "docsrs"] } } }
version = "0.2.0"
edition = "2021"
authors = ["Fusion Team"]
license = "MIT"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"

[dependencies]
anyhow = { version = "1.0.94" }
thiserror = { version = "2.0.6" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
fusion_runtime_core = { path = "registry/crates/fusion_runtime_core", version = "0.2.0" }
async-trait = { version = "0.1.83" }
tracing = { version = "0.1.41" }
reqwest = { version = "0.12.9", features = ["json", "stream", "multipart"], optional = true }
uuid = { version = "1.0", features = ["v4", "serde"] }
fusion-vscode-runtime = { path = "../../../crates/vscode-runtime" }
fusion-policy = { path = "crates/policy", version = "0.1.0", optional = true }
tokio = { version = "1.42.0", features = ["full", "tracing"] }
fusion_std = { path = "registry/crates/std" }

[features]
default = ["full"]
full = ["server", "client", "policy"]
server = []
client = ["reqwest"]
policy = ["fusion-policy"]
