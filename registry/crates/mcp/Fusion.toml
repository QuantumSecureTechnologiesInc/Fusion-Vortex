[package]
name = "fusion-mcp"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Framework: Opinionated Model Context Protocol (MCP) framework for AI agent orchestration"
keywords = ["mcp", "ai", "framework", "agent", "orchestration"]
categories = ["development-tools", "web-programming"]
readme = "README.md"

[features]
default = ["full"]
full = ["server", "client", "policy"]
server = []
client = ["reqwest"]
policy = ["fusion-policy"]

[dependencies]
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
fusion_runtime_core = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
reqwest = { workspace = true, optional = true }
uuid = { version = "1.0", features = ["v4", "serde"] }
fusion-vscode-runtime = { path = "../../../crates/vscode-runtime" }
fusion-policy = { workspace = true, optional = true }
tokio = { workspace = true }
fusion_std = "1.0.0"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
