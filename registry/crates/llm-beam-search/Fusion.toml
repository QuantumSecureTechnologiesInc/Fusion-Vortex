[package]
name = "llm-beam-search"
version = "0.2.0"
edition = "2021"
authors = ["Fusion Team"]
license = "MIT"
description = "Algorithm: Beam search decoding for LLMs. O(k·n·v) where k=beam width."
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["beam-search", "decoding", "llm", "generation", "algorithm"]
categories = ["algorithms"]
readme = "README.md"

[dependencies]
fusion_core = { workspace = true }
fusion_ai_core = { workspace = true }
fusion_std = "1.0.0"

[dev-dependencies]
criterion = { workspace = true }

