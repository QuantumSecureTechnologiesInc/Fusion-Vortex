[package]
name = "fusion_q_aws_backend"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Algorithm: Quantum algorithm/module: q-aws-backend. Optimized for performance."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["algorithm", "fusion", "quantum", "quantum-computing"]
categories = ["algorithms", "science"]
readme = "README.md"
[dependencies]
fusion_core = { workspace = true }
fusion_quantum_sdk = { path = "../q-sim", package = "fusion_q_sim" } # Linking to sim as placeholder SDK
fusion_std.workspace = true
reqwest = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"



[dev-dependencies]
criterion = { workspace = true }
