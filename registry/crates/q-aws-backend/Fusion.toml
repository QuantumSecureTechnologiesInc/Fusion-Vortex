[package]
name = "q-aws-backend"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Algorithm: Quantum algorithm/module: q-aws-backend. Optimized for performance."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["algorithm", "fusion", "quantum", "quantum-computing"]
categories = ["algorithms", "science"]
readme = "README.md"

[dependencies]
fusion_core = { path = "../fusion-core", package = "fusion-core" }
fusion_std = { path = "../std" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
uuid = { version = "1.11.0", features = ["v4", "serde"] }

[dev-dependencies]
criterion = { version = "0.5.1" }

