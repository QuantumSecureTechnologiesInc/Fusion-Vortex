[package]
name = "fusion-core"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Foundation: Core type system and abstractions for Fusion. The standard library base."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["foundation", "core", "primitives", "fusion"]
categories = ["development-tools", "no-std"]
readme = "README.md"

[dependencies]
anyhow = { version = "1.0.94" }
clap = { version = "4.5.23", features = ["derive"] }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
num_complex = { package = "num-complex", version = "0.4", features = ["serde"] }
rand = { version = "0.8.5" }
ndarray = { version = "0.15" }
num-traits = { version = "0.2" }
thiserror = { version = "2.0.6" }

[dev-dependencies]
criterion = { version = "0.5.1" }

[lib]
name = "fusion_core"
path = "src/lib.rs"
