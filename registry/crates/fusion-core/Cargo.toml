[package]
name = "fusion-core"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Foundation: Core type system and abstractions for Fusion. The standard library base."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["foundation", "core", "primitives", "fusion"]
categories = ["development-tools", "no-std"]
readme = "README.md"
[lib]
name = "fusion_core"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
num_complex = { workspace = true, features = ["serde"] }
rand = { workspace = true }
ndarray = "0.15"
num-traits = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[[example]]
name = "hybrid_vqe"
path = "examples/hybrid_vqe.rs"


