[package]
name = "fusion-ai-cli-enhanced"
version = "0.1.0"
fusion_version = ">=0.2.0"
type = "library"

[features]
agentic_integration = true
natural_language = true
smart_suggestions = true
advanced_completions = false

[metadata]
category = "ai-tools"
subcategory = "cli"
description = "AI-enhanced CLI capabilities with intelligent parsing, suggestions, and natural language support"
tags = ["ai", "cli", "enhanced", "intelligent", "natural-language", "suggestions", "completions"]
keywords = ["cli", "ai", "enhanced", "intelligent", "natural-language"]

[metadata.quality]
test_coverage = "85%"
documentation_score = "95%"
code_quality = "95%"
security_audit = "passed"
security_score = "98%"

[compatibility]
rust_version = "1.80+"
platforms = ["windows", "linux", "macos"]
architectures = ["x86_64", "aarch64"]

[api]
main_struct = "AiCli"
key_modules = [
    "command_parser",
    "suggestions",
    "natural_language",
    "error_handler",
    "completions",
    "context",
    "agentic"
]

[capabilities]
smart_parsing = true
fuzzy_matching = true
nl_processing = "enabled"
error_enhancement = true
tab_completion = true
agentic_reasoning = "optional"
history_tracking = true

[registry]
crates_io = "https://crates.io/crates/fusion-ai-cli-enhanced"
docs_rs = "https://docs.rs/fusion-ai-cli-enhanced"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"

[timestamps]
created = "2025-12-12T14:32:48Z"
last_updated = "2025-12-12T14:32:48Z"

[authors]
[[authors.entry]]
name = "Quantum Secure Technologies Inc."
email = "contact@quantum-secure-technologies.com"
role = "maintainer"
