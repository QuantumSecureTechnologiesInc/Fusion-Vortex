[package]
name = "fusion-ai-cli-enhanced"
version = "0.1.0"
edition = "2021"
authors = ["Quantum Secure Technologies Inc."]
license = "MIT OR Apache-2.0"
description = "AI-enhanced CLI capabilities for Fusion with intelligent command parsing, suggestions, and natural language support"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["cli", "ai", "enhanced", "intelligent", "natural-language"]
categories = ["command-line-interface", "development-tools", "ai"]

[lib]
name = "fusion_ai_cli_enhanced"
path = "src/lib.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "cargo", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.42", features = ["full"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
colored = "2.1"
dialoguer = "0.11"
indicatif = "0.17"
once_cell = "1.19"
parking_lot = "0.12"
regex = "1.11"
fuzzy-matcher = "0.3"
similar = "2.6"

# Integration with agentic core
fusion-agentic-core = { path = "../fusion-agentic-core", version = "0.1.0", optional = true }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.14"

[features]
default = ["agentic-integration", "natural-language", "smart-suggestions"]
agentic-integration = ["dep:fusion-agentic-core"]
natural-language = []
smart-suggestions = []
advanced-completions = []
