[package]
name = "ai-core"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Framework: AI infrastructure core with adapters and safety checks."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "framework", "ai", "infrastructure", "framework"]
categories = ["development-tools", "framework"]
readme = "README.md"

[dependencies]
anyhow = { version = "1.0.94" }
thiserror = { version = "2.0.6" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
fusion_core = { path = "../fusion-core", package = "fusion-core" }
fusion_std = { path = "../std" }
fusion_runtime_core = { path = "../fusion_runtime_core", version = "0.2.0" }
async-trait = { version = "0.1.83" }
reqwest = { version = "0.12.9", features = ["json", "stream", "multipart"] }
tracing = { version = "0.1.41" }
pqcrypto-mldsa = { version = "0.1.0" }
blake3 = { version = "1.5.0" }
tokio = { version = "1.42.0", features = ["full", "tracing"] }
ndarray = { version = "0.15" }
futures = { version = "0.3.31" }
walkdir = { version = "2.5.0" }
bytes = { version = "1.9.0" }
tempfile = { version = "3.14.0" }

[lib]
name = "fusion_ai_core"
path = "src/lib.rs"

