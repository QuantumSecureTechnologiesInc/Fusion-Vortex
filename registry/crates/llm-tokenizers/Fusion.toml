[package]
name = "fusion_llm_tokenizers"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Algorithm: LLM tokenizers (BPE, WordPiece, SentencePiece). O(n·log(v)) complexity."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["tokenizer", "bpe", "llm", "nlp", "algorithm"]
categories = ["algorithms", "text-processing"]
readme = "README.md"

[dependencies]
fusion_core = { workspace = true }
serde = { workspace = true }
fusion_std = "1.0.0"

[dev-dependencies]
criterion = { workspace = true }

