[package]
name = "fusion_llm_tokenizers"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Algorithm: LLM tokenizers (BPE, WordPiece, SentencePiece). O(n·log(v)) complexity."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["tokenizer", "bpe", "llm", "nlp", "algorithm"]
categories = ["algorithms", "text-processing"]
readme = "README.md"

[dependencies]
fusion_core = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/fusion-core", package = "fusion-core" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
fusion_std = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/std" }

[dev-dependencies]
criterion = { version = "0.5.1" }
