[package]
name = "flux-resolve-v2-hive-mind"
version = "2.0.0"
edition = "2021"
license = "MIT"
description = "Framework: Distributed dependency resolution with GPU acceleration."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "framework", "dependency-resolution", "distributed", "framework"]
categories = ["development-tools", "framework"]
readme = "README.md"
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
fusion_core = { workspace = true }
# Fusion workspace components
fusion-redis = { path = "../fusion-redis" }
fusion_runtime_core = { path = "../fusion_runtime_core" }

# Workspace dependencies
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
bytes = { workspace = true }

# External dependencies
md5 = "0.7"
hex = "0.4"

# GPU acceleration (optional)
cudarc = { version = "0.10", features = ["driver", "nvrtc"], optional = true }
fusion_std = "1.0.0"

[dev-dependencies]
fusion_runtime_core = { workspace = true }

[features]
default = []
gpu = ["cudarc"]
distributed = []

[build-dependencies]
# Build script handles CUDA compilation if available

