[package]
name = "flux-resolve-v2-hive-mind"
version = "2.0.0"
edition = "2021"
authors = ["Fusion Team"]
description = "Flux-Resolve v2.0 - Distributed dependency resolution engine with GPU acceleration and Hive Mind caching"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Fusion workspace components
fusion-redis = { path = "../fusion-redis" }
fusion_runtime_core = { path = "../fusion_runtime_core" }

# Workspace dependencies
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# External dependencies
md5 = "0.7"
hex = "0.4"

# GPU acceleration (optional)
cudarc = { version = "0.10", features = ["driver", "nvrtc"], optional = true }

[dev-dependencies]
fusion_runtime_core = { workspace = true }

[features]
default = []
gpu = ["cudarc"]
distributed = []

[build-dependencies]
# Build script handles CUDA compilation if available
