[package]
name = "fusion-agentic-core"
version = "0.1.0"
edition = "2021"
authors = ["Quantum Secure Technologies Inc."]
license = "MIT OR Apache-2.0"
description = "AI-enhanced agentic reasoning and vibe coding for the Fusion ecosystem"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["ai", "agentic", "reasoning", "vibe-coding", "code-excellence"]
categories = ["development-tools", "ai", "code-generation"]

[lib]
name = "fusion_agentic_core"
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.8"
parking_lot = "0.12"
once_cell = "1.19"
thiserror = "1.0"
tracing = "0.1"

[dev-dependencies]
criterion = "0.5"

[features]
default = ["chain-of-thought", "vibe-coding", "code-excellence"]
chain-of-thought = []
vibe-coding = []
code-excellence = []
advanced-reasoning = []
