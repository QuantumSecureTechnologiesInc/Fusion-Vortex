[package]
name = "fusion-agentic-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Framework: Core agentic capabilities for Fusion (Chain-of-Thought, Vibe Coding)."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["framework", "agent", "ai", "fusion"]
categories = ["science", "simulation"]
readme = "README.md"

[dependencies]
anyhow = { version = "1.0.94" }
clap = { version = "4.5.23", features = ["derive"] }
fusion_core = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/fusion-core", package = "fusion-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0.133" }
rayon = { version = "1.8" }
parking_lot = { version = "0.12.3" }
once_cell = { version = "1.20.2" }
thiserror = { version = "2.0.6" }
tracing = { version = "0.1.41" }
fusion_std = { path = "/mnt/c/Projects/fusion_v0_1_all_features/registry/crates/std" }

[dev-dependencies]
criterion = { version = "0.5.1" }

[features]
default = ["chain-of-thought", "vibe-coding", "code-excellence"]
chain-of-thought = []
vibe-coding = []
code-excellence = []
advanced-reasoning = []

[lib]
name = "fusion_agentic_core"
path = "src/lib.rs"
