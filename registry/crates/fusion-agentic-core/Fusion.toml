[package]
name = "fusion-agentic-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Framework: Core agentic capabilities for Fusion (Chain-of-Thought, Vibe Coding)."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["framework", "agent", "ai", "fusion"]
categories = ["science", "simulation"]
readme = "README.md"
[lib]
name = "fusion_agentic_core"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
fusion_core = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.8"
parking_lot = "0.12"
once_cell = "1.19"
thiserror = "1.0"
tracing = "0.1"
fusion_std = "1.0.0"

[dev-dependencies]
criterion = "0.5"

[features]
default = ["chain-of-thought", "vibe-coding", "code-excellence"]
chain-of-thought = []
vibe-coding = []
code-excellence = []
advanced-reasoning = []


