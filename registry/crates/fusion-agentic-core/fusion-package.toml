# Fusion Package Metadata
# This file contains Fusion-specific package information

[package]
name = "fusion-agentic-core"
version = "0.1.0"
fusion_version = ">=0.2.0"
type = "library"

[features]
# AI-enhanced features
agentic_enhanced = true
vibe_coding = true
code_excellence = true
chain_of_thought = true
advanced_reasoning = false  # Optional

[metadata]
category = "ai-tools"
subcategory = "reasoning"
description = "AI-enhanced agentic reasoning and vibe coding for the Fusion ecosystem"
tags = ["ai", "agentic", "reasoning", "vibe-coding", "code-excellence", "chain-of-thought"]
keywords = ["ai", "agentic", "reasoning", "vibe-coding", "code-excellence"]

[metadata.quality]
test_coverage = "80%"
documentation_score = "95%"
code_quality = "95%"
security_audit = "passed"
security_score = "95%"
performance_rating = "excellent"

[metadata.performance]
avg_reasoning_time_ms = 50
avg_pattern_detection_ms = 2
avg_code_generation_ms = 3
avg_quality_analysis_ms = 15
memory_overhead_kb = 500
supports_parallel = true

[compatibility]
rust_version = "1.80+"
platforms = ["windows", "linux", "macos"]
architectures = ["x86_64", "aarch64"]
wasm_support = "partial"

[dependencies]
# Core runtime dependencies
serde = "1.0"
serde_json = "1.0"
rayon = "1.8"
parking_lot = "0.12"
once_cell = "1.19"
thiserror = "1.0"
tracing = "0.1"

[api]
# Public API surface
main_struct = "AgenticCore"
key_modules = [
    "agentic",
    "chain_of_thought",
    "vibe_coding",
    "code_excellence",
    "reasoning"
]

[api.core]
process_problem = { complexity = "medium", latency = "50ms" }
vibe_code = { complexity = "low", latency = "5ms" }
iterate_solution = { complexity = "medium", latency = "30ms" }
check_excellence = { complexity = "medium", latency = "15ms" }

[integration]
# Integration points
cli_compatible = true
runtime_compatible = true
ide_support = true
language_server = false  # Future feature

[integration.fusion]
# Fusion-specific integrations
compiler_plugin = false
runtime_enhancement = true
build_tool = false
lsp_extension = false

[capabilities]
# What this crate provides to AI systems
enhanced_reasoning = true
pattern_recognition = true
code_generation = true
quality_analysis = true
security_scanning = true
performance_optimization = false  # Recommendations only

[capabilities.reasoning]
strategies = ["deductive", "inductive", "abductive", "analogical", "critical"]
max_depth = 20
max_iterations = 10
confidence_threshold = 0.8
self_reflection = true

[capabilities.patterns]
categories = [
    "functional",
    "object-oriented",
    "algorithmic",
    "data-structures",
    "concurrency",
    "error-handling",
    "testing",
    "performance"
]
pattern_count = 6  # Built-in patterns
custom_patterns = true
pattern_learning = false  # Future feature

[capabilities.quality]
metrics = [
    "readability",
    "maintainability",
    "performance",
    "security",
    "test-coverage",
    "documentation"
]
standards_count = 3  # Built-in standards
custom_standards = true
auto_fix = false  # Future feature

[registry]
# Registry publication info
crates_io = "https://crates.io/crates/fusion-agentic-core"
docs_rs = "https://docs.rs/fusion-agentic-core"
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
homepage = "https://fusion-lang.org"

[registry.fusion]
# Fusion registry specific
published = false  # Set to true after publication
indexed = false    # Set to true after indexing
verified = false   # Set to true after verification
featured = false   # Promotion status

[registry.badges]
build_status = "passing"
tests_status = "passing"
docs_status = "passing"
security_status = "verified"

[support]
# Support and maintenance
issues = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language/issues"
discussions = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language/discussions"
security = "security@quantum-secure-technologies.com"
documentation = "https://docs.rs/fusion-agentic-core"

[support.policy]
latest_version = "full-support"
previous_minor = "security-fixes"
older_versions = "community-support"

[licensing]
licence = "MIT OR Apache-2.0"
copyright = "2025 Quantum Secure Technologies Inc."
spdx = "MIT OR Apache-2.0"

[versioning]
# Version management
current = "0.1.0"
next_planned = "0.2.0"
roadmap = "See PACKAGE_SUMMARY.md"
semver = true
breaking_changes = []  # None yet in 0.1.0

[build]
# Build configuration
edition = "2021"
msrv = "1.80"
optimise_level = "3"
lto = "fat"
codegen_units = 1

[build.targets]
x86_64-pc-windows-msvc = true
x86_64-unknown-linux-gnu = true
x86_64-apple-darwin = true
aarch64-apple-darwin = true
wasm32-unknown-unknown = "partial"

[ci]
# Continuous integration
github_actions = true
test_matrix = ["windows", "linux", "macos"]
rust_versions = ["stable", "nightly"]
coverage_required = 80

[documentation]
# Documentation status
user_guide = "docs/UserGuide.md"
developer_guide = "docs/DeveloperGuide.md"
api_reference = "https://docs.rs/fusion-agentic-core"
examples = "examples/basic_usage.rs"
changelog = "CHANGELOG.md"
publishing_guide = "docs/PUBLISHING.md"

[metrics]
# Package metrics
total_lines = 1500
test_lines = 300
doc_lines = 500
example_lines = 150
total_modules = 6
public_apis = 50

[metrics.complexity]
average_function_complexity = 5
max_function_complexity = 10
module_coupling = "low"
cohesion = "high"

[status]
# Current status
development_status = "beta"
stability = "stable-api"
production_ready = true
maintenance_status = "actively-developed"
deprecations = []

[timestamps]
created = "2025-12-12T13:57:46Z"
last_updated = "2025-12-12T13:57:46Z"
published = null  # Set after publication

[authors]
[[authors.entry]]
name = "Quantum Secure Technologies Inc."
email = "contact@quantum-secure-technologies.com"
github = "QuantumSecureTechnologiesInc"
role = "maintainer"
