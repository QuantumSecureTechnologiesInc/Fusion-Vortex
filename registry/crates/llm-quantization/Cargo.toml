[package]
name = "fusion_llm_quantization"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Algorithm: INT8/INT4/INT2 quantization for LLM weights. O(n) per-layer complexity."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["quantization", "llm", "compression", "int8", "algorithm"]
categories = ["algorithms", "compression"]
readme = "README.md"

[dependencies]
fusion_core = { workspace = true }
fusion_ai_core = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

