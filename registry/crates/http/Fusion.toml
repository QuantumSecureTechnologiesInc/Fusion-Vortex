[package]
name = "http"
version = "0.2.0"
edition = "2021"
description = "Integration: Ergonomic HTTP server and client library with async/blocking support"
license = "MIT"
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["http", "server", "client", "async"]
categories = ["network-programming", "web-programming::http-server"]
readme = "README.md"

[features]
default = ["server", "client"]
server = []
client = []
tls = [] # "hyper-util/tls" feature does not exist in 0.1

[dependencies]
anyhow = { workspace = true }
fusion_runtime_core = { workspace = true }
hyper = { workspace = true }
hyper-util = { version = "0.1", features = ["tokio", "server", "client-legacy"] }
http-body-util = "0.1"
tower = { workspace = true }
serde = { workspace = true }
reqwest = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
fusion_std = "1.0.0"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

