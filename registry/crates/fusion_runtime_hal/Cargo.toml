[package]
name = "fusion_runtime_hal"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Framework: Hardware Abstraction Layer (HAL) for Fusion Runtime."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["framework", "runtime", "fusion", "hal", "hardware"]
categories = ["development-tools", "os::kernel-apis"]
readme = "README.md"

[dependencies]
fusion_core = { path = "../fusion-core", package = "fusion-core" }
fusion_q_aws_backend = { path = "../q-aws-backend" }
fusion_q_ibm_backend = { path = "../q-ibm-backend" }
parking_lot = { version = "0.12.3" }
tracing = { version = "0.1.41" }
socket2 = { version = "0.5.7" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
fusion_std = { path = "../std" }
ash = { version = "0.38.0", optional = true }
metal = { version = "0.27.0", optional = true }

[dev-dependencies]
criterion = { version = "0.5.1" }

[features]
default = []
vulkan = ["dep:ash"]
metal = ["dep:metal"]
cuda = []
