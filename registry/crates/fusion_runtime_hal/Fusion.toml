[package]
name = "fusion_runtime_hal"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Framework: Hardware Abstraction Layer (HAL) for Fusion Runtime."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["framework", "runtime", "fusion", "hal", "hardware"]
categories = ["development-tools", "os::kernel-apis"]
readme = "README.md"
[dependencies]
fusion_core = { workspace = true }
fusion_q_aws_backend = { workspace = true }
fusion_q_ibm_backend = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
socket2 = { workspace = true }
serde = { workspace = true }
fusion_std = "1.0.0"

# GPU backends (optional features)
[dependencies.ash]
workspace = true
optional = true

[dependencies.metal]
workspace = true
optional = true

[features]
default = []
vulkan = ["dep:ash"]
metal = ["dep:metal"]
cuda = []

[dev-dependencies]
criterion = { workspace = true }

