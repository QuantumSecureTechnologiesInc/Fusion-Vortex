[package]
name = "fusion-runtime-core-v2-nebula"
version = "2.0.0"
edition = "2021"
authors = ["Fusion Team"]
description = "Fusion Runtime Core v2.0 (Nebula) - Hyperscale execution engine for distributed systems"
license = "MIT OR Apache-2.0"

[package.metadata]
# Allow this crate to be referenced as "nebula" for convenience
aliases = ["nebula"]

[lib]
name = "fusion_runtime_core_v2_nebula"
path = "src/lib.rs"

[[bin]]
name = "fusion-runtime-server"
path = "src/main.rs"

[dependencies]
tonic = "0.10"
prost = "0.12"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
wasmtime = "16.0"
log = "0.4"
env_logger = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"

[build-dependencies]
tonic-build = "0.10"

[dev-dependencies]
tokio-test = "0.4"
