[package]
name = "fusion-runtime-core-v2-nebula"
version = "2.0.0"
edition = "2021"
license = "MIT"
description = "Tool: Fusion tool: fusion-runtime-core-v2-nebula. Excellent error reporting."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["tool", "cli", "fusion"]
categories = ["development-tools", "command-line-utilities"]
readme = "README.md"
[package.metadata]
# Allow this crate to be referenced as "nebula" for convenience
aliases = ["nebula"]

[lib]
name = "fusion_runtime_core_v2_nebula"
path = "src/lib.rs"

[[bin]]
name = "fusion-runtime-server"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
fusion_core = { workspace = true }
tonic = "0.10"
prost = "0.12"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
wasmtime = "16.0"
log = "0.4"
env_logger = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"

[build-dependencies]
tonic-build = "0.10"

[dev-dependencies]
tokio-test = "0.4"


