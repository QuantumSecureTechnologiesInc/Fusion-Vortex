[package]
name = "fusion_runtime_scheduler"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Framework: Preemptive Task Scheduler for Fusion Runtime."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["framework", "runtime", "fusion", "scheduler", "async"]
categories = ["development-tools", "os::kernel-apis"]
readme = "README.md"

[dependencies]
fusion_core = { path = "../fusion-core", package = "fusion-core" }
parking_lot = { version = "0.12.3" }
crossbeam = { version = "0.8" }
dashmap = { version = "5.5" }
tracing = { version = "0.1.41" }
fusion_std = { path = "../std" }

[dev-dependencies]
criterion = { version = "0.5.1" }
