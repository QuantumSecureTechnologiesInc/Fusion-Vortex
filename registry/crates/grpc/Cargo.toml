[package]
name = "fusion_server_grpc"
version = "0.2.0"
edition = "2021"
description = "High-performance gRPC (HTTP/2) server implementation"
license = "MIT"

[dependencies]
fusion_net = { path = "../fusion_net/", version = "0.2.0" }
fusion_std = { path = "../std" }
tokio = { workspace = true, features = ["net"] }
tonic = "0.10" # Standard Rust gRPC library
prost = "0.12" # Protocol Buffer compiler
