[package]
name = "fusion-deploy"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Integration: Cloud deployment adapters for AWS, GCP, Azure."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["fusion", "integration", "deployment", "cloud", "devops"]
categories = ["external-ffi-bindings", "network-programming"]
readme = "README.md"

[dependencies]
fusion_core = { path = "registry/crates/fusion-core", package = "fusion-core" }
anyhow = { version = "1.0.94" }
thiserror = { version = "2.0.6" }
serde = { version = "1.0.216", features = ["derive", "rc"] }
serde_json = { version = "1.0.133" }
toml = { version = "0.8.19" }
reqwest = { version = "0.12.9", features = ["json", "stream", "multipart"] }
fusion_runtime_core = { path = "registry/crates/fusion_runtime_core", version = "0.2.0" }
fusion_std = { path = "registry/crates/std" }
