[package]
name = "fusion_clustering"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Algorithm: K-Means clustering with K-Means++ initialization. O(n·k·i) complexity."
authors = ["Fusion Team"]
repository = "https://github.com/QuantumSecureTechnologiesInc/Fusion-Programming-Language"
keywords = ["clustering", "kmeans", "machine-learning", "algorithm"]
categories = ["algorithms", "science"]
readme = "README.md"

[dependencies]
fusion_core = { workspace = true }
rand = { version = "0.8", features = ["std_rng"] }

[dev-dependencies]
criterion = { workspace = true }

