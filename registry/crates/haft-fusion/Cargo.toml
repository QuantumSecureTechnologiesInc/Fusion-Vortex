[package]
name = "haft_fusion"
version = "0.2.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
env_logger = "0.10"
log = "0.4"


[lib]
name = "haft_fusion"
path = "src/lib.rs"

[[bin]]
name = "haft-fusion"
path = "src/main.rs"
